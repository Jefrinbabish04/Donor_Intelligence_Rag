{% extends 'base.html' %}
{% block content %}
<div class="card p-4">
    <h3 class="fw-bold mb-3">Donor Search</h3>
    <form method="get" class="row g-2 mb-4">
        <div class="col-md-10">
            <input name="q" value="{{ query }}" class="form-control" placeholder="Try: Need O+ donor in Chennai">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100" type="submit">Search</button>
        </div>
    </form>
    {% if donors %}
    <div class="row g-3">
        {% for donor in donors %}
        <div class="col-md-6">
            <div class="card p-3">
                <h5>{{ donor.name }}</h5>
                <p class="mb-1"><strong>Blood Group:</strong> {{ donor.blood_group }}</p>
                <p class="mb-1"><strong>Hospital:</strong> {{ donor.hospital }}</p>
                <p class="mb-0"><strong>City:</strong> {{ donor.city }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-muted">No donors found.</p>
    {% endif %}
</div>
{% endblock %}
